apiVersion: apps/v1
kind: Deployment

metadata:
  name: scanner-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: vuln-scanner

  template:
    metadata:
      labels:
        app: vuln-scanner

    spec:
      containers:
      - name: vuln-scanner
        image: ravi12t/vuln-scanner:latest

        ports:
        - containerPort: 5000

---
apiVersion: v1
kind: Service

metadata:
  name: scanner-service

spec:
  selector:
    app: vuln-scanner

  ports:
  - port: 80
    targetPort: 5000

  type: NodePort