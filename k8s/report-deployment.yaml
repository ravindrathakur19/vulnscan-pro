apiVersion: apps/v1
kind: Deployment

metadata:
  name: report-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: report-service

  template:
    metadata:
      labels:
        app: report-service

    spec:
      containers:
      - name: report-service
        image: ravi12t/vuln-scanner:latest

        ports:
        - containerPort: 5000

---
apiVersion: v1
kind: Service

metadata:
  name: report-service

spec:
  selector:
    app: report-service

  ports:
  - port: 81
    targetPort: 5000

  type: NodePort